<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Viajes</title>
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
    <div class="page-container">
        <div class="page-box">
            <h1>Viajes</h1>
            <div class="content">
                <textarea id="tripsContent" class="page-textarea" placeholder="Escribe sobre los viajes que queremos hacer..."></textarea>
            </div>
            <div class="button-group">
                <button class="btn-save" onclick="saveTrips()">Guardar</button>
                <button class="btn-back" onclick="window.history.back()">Volver</button>
            </div>
            <p id="mensajeTrips" class="mensaje"></p>
        </div>
    </div>
    <script>
        function saveTrips() {
            const content = document.getElementById('tripsContent').value;
            localStorage.setItem('trips', content);
            const mensaje = document.getElementById('mensajeTrips');
            mensaje.textContent = '¡Guardado!';
            mensaje.classList.add('success');
            setTimeout(() => {
                mensaje.textContent = '';
                mensaje.classList.remove('success');
            }, 2000);
        }
        
        window.addEventListener('load', () => {
            const saved = localStorage.getItem('trips');
            if (saved) {
                document.getElementById('tripsContent').value = saved;
            }
        });
    </script>
</body>
</html>
