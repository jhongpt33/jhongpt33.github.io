<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diario</title>
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
    <div class="page-container">
        <div class="page-box">
            <h1>Diario</h1>
            <div class="content">
                <textarea id="diaryContent1" class="page-textarea" placeholder="Escribe tus pensamientos aquí..."></textarea>
            </div>
            <div class="button-group">
                <button class="btn-save" onclick="savePage1()">Guardar</button>
                <button class="btn-back" onclick="window.history.back()">Volver</button>
            </div>
            <p id="mensaje1" class="mensaje"></p>
        </div>
    </div>
    <script>
        function savePage1() {
            const content = document.getElementById('diaryContent1').value;
            localStorage.setItem('diario1', content);
            const mensaje = document.getElementById('mensaje1');
            mensaje.textContent = '¡Guardado!';
            mensaje.classList.add('success');
            setTimeout(() => {
                mensaje.textContent = '';
                mensaje.classList.remove('success');
            }, 2000);
        }
        
        window.addEventListener('load', () => {
            const saved = localStorage.getItem('diario1');
            if (saved) {
                document.getElementById('diaryContent1').value = saved;
            }
        });
    </script>
</body>
</html>
