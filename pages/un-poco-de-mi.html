            <div class="button-group">
                <button class="btn-save" onclick="saveAbout()">Guardar</button>
                <button class="btn-back" onclick="window.history.back()">Volver</button>
            </div>
            <p id="mensajeAbout" class="mensaje"></p>
        </div>
    </div>
    <script>
        function saveAbout() {
            const content = document.getElementById('aboutContent').value;
            localStorage.setItem('aboutMe', content);
            const mensaje = document.getElementById('mensajeAbout');
            mensaje.textContent = '¡Guardado!';
            mensaje.classList.add('success');
            setTimeout(() => {
                mensaje.textContent = '';
                mensaje.classList.remove('success');
            }, 2000);
        }
        
        window.addEventListener('load', () => {
            const saved = localStorage.getItem('aboutMe');
            if (saved) {
                document.getElementById('aboutContent').value = saved;
            }
        });
    </script>
