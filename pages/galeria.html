<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galería</title>
    <link rel="stylesheet" href="../css/styles.css">
    <style>
        .gallery-content {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 20px;
            max-height: 400px;
            overflow-y: auto;
        }

        .gallery-item {
            position: relative;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
        }

        .gallery-item img,
        .gallery-item video {
            width: 100%;
            height: 200px;
            object-fit: cover;
            cursor: pointer;
        }

        .delete-btn {
            position: absolute;
            top: 5px;
            right: 5px;
            background: rgba(255, 0, 0, 0.8);
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 3px;
            cursor: pointer;
            font-size: 12px;
        }

        .delete-btn:hover {
            background: rgba(255, 0, 0, 1);
        }

        .file-input-wrapper {
            margin-bottom: 20px;
        }

        .file-input-wrapper input[type="file"] {
            display: none;
        }

        .custom-file-input {
            display: inline-block;
            padding: 10px 20px;
            background: #667eea;
            color: white;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        .custom-file-input:hover {
            background: #764ba2;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            max-width: 90%;
            max-height: 90%;
        }

        .modal-content img,
        .modal-content video {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .close-modal {
            position: absolute;
            top: 20px;
            right: 40px;
            color: white;
            font-size: 40px;
            cursor: pointer;
            font-weight: bold;
        }

        .close-modal:hover {
            color: #ccc;
        }
    </style>
</head>
<body>
    <div class="page-container">
        <div class="page-box">
            <h1>Galería de Fotos y Videos</h1>
            
            <div class="file-input-wrapper">
                <label for="fileInput" class="custom-file-input">
                    + Subir Imágenes/Videos
                </label>
                <input type="file" id="fileInput" accept="image/*,video/*" multiple>
            </div>

            <div class="gallery-content" id="gallery"></div>

            <div class="button-group">
                <button class="btn-back" onclick="window.history.back()">Volver</button>
            </div>
            <p id="mensaje" class="mensaje"></p>
        </div>
    </div>

    <div class="modal" id="modal">
        <span class="close-modal" onclick="closeModal()">&times;</span>
        <div class="modal-content" id="modalContent"></div>
    </div>

    <script>
        const fileInput = document.getElementById('fileInput');
        const gallery = document.getElementById('gallery');
        const modal = document.getElementById('modal');
        const modalContent = document.getElementById('modalContent');
        const mensaje = document.getElementById('mensaje');

        // Cargar galería al iniciar
        loadGallery();

        // Manejar selección de archivos
        fileInput.addEventListener('change', (e) => {
            const files = Array.from(e.target.files);
            let loadedCount = 0;

            files.forEach((file) => {
                const reader = new FileReader();
                reader.onload = (event) => {
                    const data = {
                        type: file.type,
                        src: event.target.result,
                        timestamp: Date.now()
                    };

                    let gallery_data = JSON.parse(localStorage.getItem('gallery') || '[]');
                    gallery_data.push(data);
                    localStorage.setItem('gallery', JSON.stringify(gallery_data));

                    loadedCount++;
                    if (loadedCount === files.length) {
                        loadGallery();
                        fileInput.value = '';
                        mostrarMensaje('¡Archivos subidos correctamente!', 'success');
                    }
                };
                reader.readAsDataURL(file);
            });
        });

        function loadGallery() {
            gallery.innerHTML = '';
            const gallery_data = JSON.parse(localStorage.getItem('gallery') || '[]');

            if (gallery_data.length === 0) {
                gallery.innerHTML = '<p style="grid-column: 1/-1; text-align: center; color: #999;">No hay archivos aún</p>';
                return;
            }

            gallery_data.forEach((item, index) => {
                const div = document.createElement('div');
                div.className = 'gallery-item';

                const isVideo = item.type.startsWith('video');
                const element = isVideo ? 'video' : 'img';
                const controls = isVideo ? 'controls' : '';

                div.innerHTML = `
                    <${element} src="${item.src}" onclick="openModal(this)" ${controls}></${element}>
                    <button class="delete-btn" onclick="deleteItem(${index})">Eliminar</button>
                `;

                gallery.appendChild(div);
            });
        }

        function openModal(element) {
            if (element.tagName === 'IMG') {
                modalContent.innerHTML = `<img src="${element.src}">`;
            } else {
                modalContent.innerHTML = `<video controls style="width: 100%; height: 100%;"><source src="${element.src}"></video>`;
            }
            modal.style.display = 'flex';
        }

        function closeModal() {
            modal.style.display = 'none';
        }

        function deleteItem(index) {
            let gallery_data = JSON.parse(localStorage.getItem('gallery') || '[]');
            gallery_data.splice(index, 1);
            localStorage.setItem('gallery', JSON.stringify(gallery_data));
            loadGallery();
            mostrarMensaje('Archivo eliminado', 'success');
        }

        function mostrarMensaje(text, type) {
            mensaje.textContent = text;
            mensaje.classList.remove('error', 'success');
            mensaje.classList.add(type);
            setTimeout(() => {
                mensaje.textContent = '';
                mensaje.classList.remove(type);
            }, 3000);
        }

        // Cerrar modal al hacer clic afuera
        modal.addEventListener('click', (e) => {
            if (e.target === modal) closeModal();
        });
    </script>
</body>
</html>
